{% extends "layout.html" %}

{% block content %}

<h2>My Tasks</h2>

<form method="POST">

Task Title
<input type="text" name="title" class="form-control">

<br>

Date
<input type="date" name="date" class="form-control">

<br>

<button class="btn btn-primary">Add Task</button>

</form>

<br><br>

<table class="table table-bordered">

<tr>
<th>Task</th>
<th>Date</th>
<th>Status</th>
<th>Action</th>
</tr>

{% for t in tasks %}

<tr>

<td>{{ t[1] }}</td>
<td>{{ t[2] }}</td>
<td>{{ t[3] }}</td>
<td>{{ t[4] }}</td>

<td>

<a href="/complete_task/{{ t[0] }}" class="btn btn-success btn-sm">
Complete
</a>

<a href="/delete_task/{{ t[0] }}" class="btn btn-danger btn-sm">
Delete
</a>

</td>

</tr>

{% endfor %}

</table>

{% endblock %}
