{% extends "layout.html" %}

{% block content %}

<h2>Send Email</h2>

<!-- Flash Message -->
{% with messages = get_flashed_messages() %}
{% if messages %}
<div id="successMessage" class="alert alert-success">
{{ messages[0] }}
</div>
{% endif %}
{% endwith %}

<form id="emailForm" method="POST">

<div class="mb-3">
<label>Group</label>
<select name="group" id="group" class="form-select">
<option value="employees">Employees</option>
<option value="clients">Clients</option>
<option value="management">Management</option>
</select>
</div>

<div class="mb-3">
<label>Subject</label>
<input type="text" name="subject" id="subject" class="form-control">
</div>

<div class="mb-3">
<label>Message</label>
<textarea name="body" id="message" rows="5" class="form-control"></textarea>
</div>

<button type="button" class="btn btn-secondary" onclick="startVoiceAssistant()">🎤 Speak</button>

<br><br>

<button type="submit" class="btn btn-primary">Send Email</button>

</form>

<script>

function speak(text){
let speech = new SpeechSynthesisUtterance(text);
speech.lang = "en-US";
speechSynthesis.speak(speech);
}

function listen(callback){
const recognition = new webkitSpeechRecognition();
recognition.lang = "en-US";
recognition.start();

recognition.onresult = function(event){
let text = event.results[0][0].transcript;
callback(text);
}
}

function startVoiceAssistant(){

speak("Please say the subject");

setTimeout(function(){

listen(function(subject){

document.getElementById("subject").value = subject;

speak("Please say the message");

setTimeout(function(){

listen(function(message){

document.getElementById("message").value = message;

speak("Sending email");

document.getElementById("emailForm").submit();

});

},2000);

});

},2000);

}

window.onload = function(){

let msg = document.getElementById("successMessage");

if(msg){

let text = msg.innerText;

let speech = new SpeechSynthesisUtterance(text);

speech.lang = "en-US";

speechSynthesis.speak(speech);

}

}

</script>

{% endblock %}
