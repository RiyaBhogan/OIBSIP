<!DOCTYPE html>

<html>

<head>

<title>Office Assistant</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
display:flex;
margin:0;
}

.sidebar{
width:230px;
height:100vh;
background:#2c3e50;
color:white;
padding:20px;
}

.sidebar a{
display:block;
color:white;
padding:10px;
text-decoration:none;
}

.sidebar a:hover{
background:#34495e;
}

.content{
flex:1;
padding:20px;
}

.topbar{
display:flex;
justify-content:flex-end;
margin-bottom:15px;
}

.role-text{
font-weight:bold;
color:#0d6efd;
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h4>Office Assistant</h4>

<hr>

<a href="/dashboard">Dashboard</a> <a href="/email">Send Email</a> <a href="/email_history">Email History</a> <a href="/meetings">Meetings</a> <a href="/tasks">Tasks</a> <a href="/reminders">Reminders</a> <a href="/logout">Logout</a>

</div>

<!-- Content Area -->

<div class="content">

<!-- Top Right Login Role -->

<div class="topbar">

<span class="role-text">

{% if session["role"] == "hr" %}
HR Logged In
{% elif session["role"] == "employee" %}
Employee Logged In
{% endif %}

</span>

</div>

{% block content %}

{% endblock %}

</div>

</body>

</html>
