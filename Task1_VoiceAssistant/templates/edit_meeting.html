{% extends "layout.html" %}

{% block content %}

<h2>Edit Meeting</h2>

<form method="POST">

Title
<input type="text" name="title" class="form-control" value="{{ meeting[1] }}">

<br>

Date
<input type="date" name="date" class="form-control" value="{{ meeting[2] }}">

<br>

Time
<input type="time" name="time" class="form-control" value="{{ meeting[3] }}">

<br>

<button class="btn btn-primary">Update Meeting</button>

</form>

{% endblock %}
